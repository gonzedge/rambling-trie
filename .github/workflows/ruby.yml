name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true
      - name: Set up rbs collection
        run: bundle exec rbs collection update
      - name: Run rbs + steep
        run: bundle exec rake steep
      - name: Run reek
        run: bundle exec rake reek
      - name: Run rubocop
        run: bundle exec rake rubocop
      - name: Run yardoc
        run: bundle exec rake yard
  spec:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version:
          - 4.0.2
          - 4.0.1
          - 4.0.0
          - 3.4.9
          - 3.4.8
          - 3.4.7
          - 3.4.6
          - 3.4.5
          - 3.4.4
          - 3.4.3
          - 3.4.2
          - 3.4.1
          - 3.4.0
          - 3.3.11
          - 3.3.10
          - 3.3.9
          - 3.3.8
          - 3.3.7
          - 3.3.6
          - 3.3.5
          - 3.3.4
          - 3.3.3
          - 3.3.2
          - 3.3.1
          - 3.3.0
          - 3.2.11
          - 3.2.10
          - 3.2.9
          - 3.2.8
          - 3.2.7
          - 3.2.6
          - 3.2.5
          - 3.2.4
          - 3.2.3
          - 3.2.2
          - 3.2.1
          - 3.2.0
    steps:
      - uses: actions/checkout@v6
      - name: Set up ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run rspec
        run: bundle exec rake spec
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true
      - name: Run rspec with test coverage
        run: bundle exec rake spec
      - name: Report test coverage to coveralls.io
        uses: coverallsapp/github-action@v2
